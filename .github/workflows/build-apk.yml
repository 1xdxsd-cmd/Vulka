name: 📱 Build APK — Patitas Inventory

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: 🔨 Compilar APK
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 📂 Preparar carpeta www
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp service-worker.js www/
          echo "✅ www/ listo"

      - name: 🔌 Capacitor add & sync Android
        run: |
          npx cap add android || true
          npx cap sync android

      - name: 🔧 Build APK debug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 📤 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Patitas-Inventory-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 60

      - name: 🚀 Crear Release con el APK
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Patitas Inventory v${{ github.run_number }}"
          body: |
            ## 🐾 Patitas Inventory — APK listo

            **Vulcanizadora Patitas** · Av del Sauce 107, Saucito, SLP 78110

            ### ✅ Funciones
            - Base de datos 100% local en el teléfono (sin internet)
            - Agregar, vender y comprar llantas
            - Comprobante PDF con **garantía de 15 días**
            - Compartir comprobante por **WhatsApp** con un toque
            - Mapa visual del almacén
            - Alertas de stock bajo y agotado

            ### 📲 Cómo instalar
            1. Descarga **Patitas-Inventory.apk** aquí abajo
            2. En tu Android: **Ajustes → Seguridad → Fuentes desconocidas** → Activar
            3. Abre el APK y toca **Instalar**
            4. ¡Listo! 🐾
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
