<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f4e"/>
      <stop offset="100%" style="stop-color:#1a3575"/>
    </linearGradient>
    <linearGradient id="tiregr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cfff"/>
      <stop offset="100%" style="stop-color:#0080cc"/>
    </linearGradient>
    <linearGradient id="pawgr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500"/>
      <stop offset="100%" style="stop-color:#ff4800"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Grid decorativo -->
  <g opacity="0.05" stroke="#00cfff" stroke-width="1">
    <line x1="0" y1="102" x2="512" y2="102"/>
    <line x1="0" y1="204" x2="512" y2="204"/>
    <line x1="0" y1="306" x2="512" y2="306"/>
    <line x1="0" y1="408" x2="512" y2="408"/>
    <line x1="102" y1="0" x2="102" y2="512"/>
    <line x1="204" y1="0" x2="204" y2="512"/>
    <line x1="306" y1="0" x2="306" y2="512"/>
    <line x1="408" y1="0" x2="408" y2="512"/>
  </g>

  <!-- ── LLANTA ── -->
  <!-- Goma exterior -->
  <circle cx="256" cy="265" r="152" fill="#0f1923" filter="url(#dropshadow)"/>
  <!-- Textura banda rodadura -->
  <circle cx="256" cy="265" r="152" fill="none" stroke="#1c2d3e" stroke-width="18" stroke-dasharray="20 8"/>
  <!-- Aro exterior -->
  <circle cx="256" cy="265" r="118" fill="url(#tiregr)" opacity="0.92" filter="url(#glow)"/>
  <!-- Aro interior (sombra) -->
  <circle cx="256" cy="265" r="112" fill="#0a1628"/>
  <!-- Espacio neumático negro -->
  <circle cx="256" cy="265" r="106" fill="#0f1923"/>
  <!-- Centro del aro vuelve a azul -->
  <circle cx="256" cy="265" r="66" fill="url(#tiregr)" opacity="0.85"/>
  <!-- Hub -->
  <circle cx="256" cy="265" r="26" fill="#0d1f4e"/>
  <circle cx="256" cy="265" r="14" fill="#00cfff" opacity="0.6"/>
  <!-- Rayos (8 rayos) -->
  <g stroke="url(#tiregr)" stroke-width="11" stroke-linecap="round" opacity="0.88">
    <line x1="256" y1="199" x2="256" y2="220"/>
    <line x1="256" y1="310" x2="256" y2="331"/>
    <line x1="190" y1="265" x2="211" y2="265"/>
    <line x1="301" y1="265" x2="322" y2="265"/>
    <line x1="209" y1="218" x2="224" y2="233"/>
    <line x1="288" y1="297" x2="303" y2="312"/>
    <line x1="303" y1="218" x2="288" y2="233"/>
    <line x1="209" y1="312" x2="224" y2="297"/>
  </g>
  <!-- Brillo aro -->
  <ellipse cx="226" cy="238" rx="24" ry="11" fill="white" opacity="0.1" transform="rotate(-35 226 238)"/>

  <!-- ── PATITA encima ── -->
  <g filter="url(#dropshadow)">
    <!-- Dedo izq arriba -->
    <ellipse cx="204" cy="210" rx="23" ry="19" fill="url(#pawgr)"/>
    <!-- Dedo centro-izq arriba -->
    <ellipse cx="244" cy="196" rx="21" ry="17" fill="url(#pawgr)"/>
    <!-- Dedo centro-der arriba -->
    <ellipse cx="284" cy="197" rx="21" ry="17" fill="url(#pawgr)"/>
    <!-- Dedo der arriba -->
    <ellipse cx="320" cy="213" rx="20" ry="17" fill="url(#pawgr)"/>
    <!-- Almohadilla central (grande) -->
    <ellipse cx="260" cy="258" rx="50" ry="42" fill="url(#pawgr)"/>
    <!-- Brillos -->
    <ellipse cx="245" cy="247" rx="18" ry="10" fill="white" opacity="0.15" transform="rotate(-25 245 247)"/>
    <ellipse cx="208" cy="205" rx="9" ry="5" fill="white" opacity="0.15"/>
    <ellipse cx="247" cy="192" rx="8" ry="4" fill="white" opacity="0.15"/>
  </g>

  <!-- ── NOMBRE ── -->
  <text x="256" y="446" font-family="'Arial Black',Arial,sans-serif" font-size="44" font-weight="900"
    fill="url(#pawgr)" text-anchor="middle" letter-spacing="2">PATITAS</text>
  <line x1="130" y1="455" x2="382" y2="455" stroke="#ff7a00" stroke-width="1.5" opacity="0.35"/>
  <text x="256" y="484" font-family="Arial,sans-serif" font-size="21" font-weight="700"
    fill="#00cfff" text-anchor="middle" letter-spacing="3" opacity="0.9">INVENTORY</text>
</svg>
